# hypothesis_registry.yaml — SỔ ĐĂNG KÝ GIẢ THUYẾT (pre-registration)
#
# Mục đích (docs/10 D1/G0, docs/09 §2.8): chống data-snooping bằng cách ĐĂNG KÝ
# mỗi giả thuyết — phát biểu, dữ liệu, test, ngày — TRƯỚC khi nhìn kết quả. Sau khi
# nhìn kết quả rồi mới đổi giả thuyết/spec = HARKing (hypothesizing after results
# known). Registry này khóa bằng máy (tests/test_registry_locked.py): mọi thay đổi
# vào giả thuyết ĐÃ đăng ký phải qua commit có chủ đích + giải thích.
#
# QUY TẮC:
#   - status: registered  -> đã đăng ký, CHƯA chạy. Được sửa tự do (chưa tiêu bậc tự do).
#   - status: tested       -> đã chạy + có report. KHÓA: không sửa statement/spec/data.
#     Đổi ý sau khi tested = giả thuyết MỚI (id mới), không phải sửa cái cũ.
#   - Mỗi lần chạy 1 test = 1 lần thử -> đếm vào n_trials (multiple-testing, Deflated Sharpe).
#
# Claims matrix (mức claim tối đa cho mỗi thành phần): docs/07_formulas_reference_v2.md §6.4.
# KHÔNG lặp lại ở đây — trỏ về.

registry_version: "1.0"
created: "2026-07-18"

# ---------------------------------------------------------------------------
# SPEC KHÓA TRƯỚC (pre-registered) — chọn TRƯỚC khi đọc kết quả G2a
# ---------------------------------------------------------------------------
# AR order cho PERSISTENT (shocks.py) chọn bằng BIC trong TRẦN PARSIMONY p=5, trên
# DEVELOPMENT WINDOW ONLY (2015-01-01..2020-12-31), rồi KHÓA. Đây là bậc tự do
# docs/10 §5 cảnh báo: thử nhiều order rồi chọn cái cho kết quả G2a đẹp = snooping.
# Khóa ở đây để select_ar_order tái lập và audit được.
#
# QUYẾT ĐỊNH 2026-07-18 (sau robustness, docs/g0 §1.1): dùng TRẦN p=5 + BIC thay vì
# AIC-trần-mở. Lý do: AIC/BIC KHÔNG có cực tiểu nội với GPR daily (tự tương quan
# regime dài đẩy argmin AIC->20+, BIC->14-16 — tiêu chí tự do đuổi biên, spec bất
# ổn). NHƯNG innovation đo được đã ổn định từ p~6 (corr(innov_p8,innov_p10)=0.99,
# autocorr innovation ~0.03-0.04 ở mọi order 4..16). Trần p=5 (1 tuần giao dịch) có
# diễn giải kinh tế, đủ khử autocorr (rho1~0.04 từ p=4), parsimony. Lag regime bậc
# cao còn lại LP tầng 2 kiểm soát bằng macro-lags.
ar_persistent_spec:
  method: AR                       # AR(p) rolling one-step (không EWMA — quyết định 2026-07-18)
  order_selection: bic_dev_window_capped
  criterion: bic
  dev_window: ["2015-01-01", "2020-12-31"]
  max_order_searched: 5            # TRẦN parsimony chủ động (không phải giới hạn kỹ thuật)
  # Order chọn được (deterministic, tái lập bằng select_ar_order):
  orders:
    GPRD: 5
    GPRD_ACT: 5
    GPRD_THREAT: 2
  # boundary_flag=true: GPRD/GPRD_ACT ở TRẦN p=5. Khác với bản 8 trước đây — giờ
  # trần là lựa chọn kinh tế CÓ CHỦ ĐÍCH (parsimony 1 tuần), đã kiểm robustness:
  # innovation bất biến ở vùng order thấp. KHÔNG cần nới thêm; ghi flag để minh
  # bạch rằng order = trần, không phải cực tiểu nội.
  boundary_flag: true
  robustness_checked: true

# ---------------------------------------------------------------------------
# GIẢ THUYẾT ĐĂNG KÝ
# ---------------------------------------------------------------------------
hypotheses:
  - id: KĐ1
    statement: >
      ΔVN-Index excess return phản ứng có ý nghĩa thống kê với GPR innovation
      (global-direct và/hoặc qua kênh macro). H0: mọi hệ số phản ứng = 0.
    source: "docs/01 §C2 Kiểm định 1; docs/07v2 §5.1"
    data: "VN-Index daily return + GPRD_INNOV + macro (oil/dxy/vix/us10y). Track daily (KHÔNG GPRC_VNM — #10)."
    shock: GPRD_INNOV                # innovation, không level (#9)
    method: "Local Projection (Jordà), HAC/Newey-West; bootstrap SE"
    outcome: "VN-Index excess return, horizons 0..H"
    decides_gate: G2b
    registered: "2026-07-18"
    status: registered

  - id: KĐ3
    statement: >
      Hệ số của threats (GPT_INNOV) khác hệ số của acts-bất-ngờ (GPA_SURPRISE_V1)
      có ý nghĩa; act đã dự đoán được (đã price-in) tác động yếu hơn act bất ngờ.
      H0: β_GPT = β_GPA_surprise.
    source: "docs/01 §C2 Kiểm định 3"
    data: "GPT_INNOV vs GPA_SURPRISE_V1 (surrogate — spec đầy đủ cần S-GPR+Ladder, G5/G6)"
    shock: [GPT_INNOV, GPA_SURPRISE_V1]
    method: "LP; Wald test chênh lệch hệ số"
    outcome: "VN-Index / market return"
    decides_gate: G2b
    registered: "2026-07-18"
    status: registered
    note: "GPA_SURPRISE_V1 là surrogate; kết quả KHÔNG so trực tiếp với spec đầy đủ sau này (khác version)."

  - id: KĐ5
    statement: >
      Global GPR daily (GPRD_INNOV) DẪN TRƯỚC phản ứng của VN với độ trễ Δ>0 ổn
      định (vài giờ–2 ngày), VÀ trong khoảng trễ đó VN-Index chưa phản ứng hết →
      leading indicator khả dụng. H0: Δ=0 (chỉ đồng thời, không dẫn trước).
    source: "docs/01 §C2 Kiểm định 5 — 'giá trị thương mại cao nhất'"
    data: "GPRD_INNOV daily (available_at +1d) vs VN-Index; lead-lag"
    shock: GPRD_INNOV
    method: "Lead-lag / Granger; LP theo horizon; point-in-time available_at"
    outcome: "VN-Index return, độ trễ Δ"
    decides_gate: G2b
    registered: "2026-07-18"
    status: registered
    note: "Điểm nhạy look-ahead nhất — GPRD publish trễ ~1 ngày (#11). Dùng available_at, KHÔNG date."

  - id: KĐ12
    statement: >
      Tổng tác động GPR→VN-Index phân rã thành BA phần: Global-direct (β),
      Indirect (tích chập Σ_M Σ_s γ(s)·θ(h−s)), Domestic-direct (λ). Kỳ vọng
      Indirect ≫ (β+λ) — nền KT nhỏ mở chịu shock chủ yếu qua kênh vĩ mô toàn cầu.
      Nếu λ đáng kể → rủi ro riêng VN, biện minh V-phase corpus tiếng Việt.
    source: "docs/01 §C2 Kiểm định 12; docs/07v2 §5.1-5.3"
    data: "GPRD_INNOV + macro (tầng 2 γ) + GPRC_VNM⊥_INNOV (λ, monthly track only)"
    shock: [GPRD_INNOV, "GPRC_VNM_ORTH_INNOV"]
    method: "LP tầng 2 (γ) + tầng 3 (β,θ,λ); Indirect = convolution (KHÔNG nhân cùng horizon); Shapley/LMG cho đóng góp kênh; bootstrap SE"
    outcome: "VN-Index return, phân rã 3 kênh theo horizon"
    decides_gate: G2b
    claim_ceiling: "transmission decomposition / predictive — KHÔNG causal (chưa structural ID, claims matrix 07v2 §6.4)"
    registered: "2026-07-18"
    status: registered

  - id: KĐ-E1b
    statement: >
      Trong ba thước đo shock {INNOVATION, JUMP, LEVEL+JUMP}, thước đo nào PHÁT
      HIỆN các cú sốc địa chính trị lớn đã biết (event study descriptor) tốt nhất
      trên toàn mẫu 1990+, đo bằng: (a) độ nổi bật của thước đo tại các episode
      lớn so với nền, (b) tỉ lệ episode lớn được thước đo highlight, (c) tính ổn
      định của ranking qua sub-sample. Quyết định trường SHOCK của ô chính docs/12.
    source: "docs/11 §10 E1b; docs/12 §2.2 (ô chính) §9 (checklist)"
    data: "GPRD/GPRD_ACT/GPRD_THREAT daily 1990+; danh sách episode lớn = GPRD vượt phân vị 97.5 rolling, dedup cụm"
    shock: [GPRD_INNOV, GPRD_JUMP, "GPRD_LEVEL+JUMP"]
    method: "Event-study descriptor (KHÔNG hồi quy outcome — tránh circular với tầng 2); rank + σ; sub-sample robustness"
    outcome: "Không có outcome macro — đo thuộc tính nội tại của thước đo shock"
    decides_gate: "SCA-01 primary_cell.shock"
    claim_ceiling: "measurement (mô tả thuộc tính thước đo, không claim tác động)"
    registered: "2026-07-19"
    status: tested
    report: "docs/reports/E1b_shock_ranking_8cc9bfb5c3b6.md"
    result: >
      Ranking THEO NHÃN ARTIFACT (hit rate phát hiện episode, full sample): LEVEL+JUMP (68.7%) >
      JUMP (55.4%) > INNOVATION (32.5%). Winner LEVEL+JUMP đứng đầu ở MỌI
      sub-sample (pre-2008/2008-2015/post-2015). INNOVATION kém nhất — xác nhận
      E1 trên toàn 166 episode, không chỉ Hormuz. Kết luận chọn ô chính từ artifact
      này đã bị rút; SCA-01 vẫn UNRESOLVED chờ E1c-exo.
    artifact_formula: "Nhãn LEVEL+JUMP thực tế = INNOVATION+JUMP; xem ERRATA trong report"
    note: >
      Diagnostic, KHÔNG chạm holdout. E1 (1 episode Hormuz) đã gợi ý JUMP; E1b
      xác nhận trên toàn mẫu. Không đo trên outcome để không leak vào lưới SCA sau.
    superseded_by: KĐ-E1c
    superseded_reason: >
      docs/13 §1: định nghĩa episode (GPRD>q97.5) NỘI SINH với GPRD → ranking phần
      lớn do cấu tạo (LEVEL cao theo định nghĩa ở ngày GPRD cao; INNOVATION cố ý
      không đơn điệu). Ngưỡng 2σ (§1.2) không so được JUMP zero-inflated vs LEVEL
      skew. KĐ-E1c thay: sự kiện NGOẠI SINH (gold set) + AUC. ô chính LEVEL+JUMP
      KHÔNG được dùng cho tới khi E1c-exo xác nhận.

  - id: KĐ-E1c
    statement: >
      Thước đo shock nào phát hiện đúng cú sốc địa chính trị lớn khi tập sự kiện
      xác định ĐỘC LẬP với GPRD (gold set ngoại sinh)? Đo bằng AUC (Mann-Whitney,
      bất biến biến đổi đơn điệu → miễn nhiễm zero-inflation JUMP + skew LEVEL).
      Thước đo: INNOVATION, JUMP, LEVEL+JUMP, LEVEL. Quyết định primary_cell.shock.
    source: "docs/13 §2"
    data: "GPRD daily 1990+; sự kiện = data/gold_events.csv (2 người dựng tay, KHÔNG tra GPRD)"
    shock: [GPRD_INNOV, GPRD_JUMP, "GPRD_LEVEL+JUMP", GPRD_LEVEL]
    method: "AUC Mann-Whitney event vs control; bootstrap CI phân tầng năm B=2000; endo+exo (self-refute §2.5)"
    outcome: "Không có outcome macro — thuộc tính nội tại thước đo"
    decides_gate: "SCA-01 primary_cell.shock"
    claim_ceiling: "measurement"
    registered: "2026-07-19"
    status: registered      # exo chưa chạy được — chặn bởi gold set (G-Gold)
    note: >
      Bản ENDO cũ KHÔNG CÒN HỢP LỆ: code đã gắn nhãn LEVEL+JUMP nhưng thực tế tính
      INNOVATION+JUMP. Contract đã khóa lại thành LEVEL+JUMP := LEVEL + JUMP; phải
      chạy lại ENDO bằng code mới trước khi đọc ranking. Bản EXO (bản DÙNG) vẫn chặn
      bởi data/gold_events.csv. KHÔNG chốt ô chính từ endo. LEVEL là ngoại lệ
      measurement (không phải shock hồi quy nên #9 không áp).

# ---------------------------------------------------------------------------
# SPECIFICATION CURVE (docs/12) — entry đơn cho lưới 384 spec (SHOCK 4 mức)
# ---------------------------------------------------------------------------
# ⚠️ CHƯA ĐỦ ĐIỀU KIỆN CHẠY. protocol_commit chờ commit docs/12. Checklist docs/13 §6
# còn thiếu: gold_events.csv → E1c-exo → chốt primary_cell.shock. Entry ghi TRƯỚC
# nhưng lưới KHÔNG chạy cho tới khi các cổng G-Gold/G-E1c/G-Primary/G-Gov đầy đủ.
specification_curves:
  - id: SCA-01
    registered_at: 2026-07-19
    protocol_doc: docs/12_specification_curve_protocol.md
    protocol_commit: "<điền commit hash docs/12 khi commit>"
    type: specification_curve
    statement: >
      Tác động của cú sốc địa chính trị lên kết quả vĩ mô khác 0, kiểm định chung
      trên tập spec hợp lệ. TÁI CẤU TRÚC 2026-07-19 (review docs/13-hậu §1): outcome
      là TRỤC BÁO CÁO (một curve mỗi outcome), KHÔNG phải chiều lưới; FREQ tách riêng.
      Mỗi curve = 96 spec cơ sở × FREQ (2 mức cho giá tài sản, 1 cho vĩ mô thực/freight).
    grid_dimensions:                # chiều lưới (cho MỖI curve)
      shock: [INNOVATION, JUMP, "LEVEL+JUMP", LEVEL]   # LEVEL+JUMP := LEVEL + JUMP; +LEVEL sau E0 PASS
      freq: [daily, monthly]        # tách khỏi biến đích (bỏ FREQ_OUTCOME cũ)
      funcform: [OLS, "quantile_tau_.10/.25/.50/.75/.90"]
      channel: [pooled, act_threat_split]
      jump_thresh: [q95, q99]       # chỉ khi shock có JUMP
      sample: [full, exclude_2026]
    report_axis_outcome:            # TRỤC báo cáo — mỗi cái 1 curve riêng (KHÔNG gộp)
      asset_price: [oil, dxy, vix, us10y]        # 192 spec/curve (2 FREQ)
      real_macro: [IP, CPI, infl_expectation]    # 96 spec/curve (1 FREQ)
      physical_channel: [freight]                # 96 spec/curve; freight_vintage vào metadata
    primary_cell:
      outcome: IP                   # curve chính (vĩ mô thực, track tháng)
      shock: UNRESOLVED             # E1b LEVEL+JUMP BỊ BÁC (docs/13 §1). Chốt sau E1c-exo hoặc MỞ (§3.1: 4 mức, Holm 4×H).
      freq: monthly
      funcform: quantile_tau_0.10
      channel: act_threat_split
      jump_thresh: q95
      sample: full
      focal_horizons: [1, 2, 6]     # track tháng; giữ vùng tín hiệu E0 h=1,2 và mốc bền h=6
      daily_focal_horizons: [5, 20, 30]  # bao phủ phát hiện G2a quanh h≈29
      weekend_aggregation:          # aggregate sau D+1, trước khi ghép composite
        LEVEL: mean
        INNOVATION: mean
        JUMP: max
        LEVEL_PLUS_JUMP: "mean(LEVEL)+max(JUMP)"
    test_statistics: [median_effect, share_significant, stouffer_z]
    null_distribution:
      method: moving_block_bootstrap_under_null
      B: 1000
      block_length_monthly: 12
      block_length_daily: 60
    lp_inference:
      method: lag_augmented_LP
      se: white
      bands: sup_t_simultaneous
    status: registered_not_run
    # DONE: build_monthly_panel, E0 replication headline PASS, E0 aligned diagnostic PASS
    # (docs/reports/E0_alignment_diagnostic_e73a0a307fc3_c93a877.md), holdout ghi g0 §2.
    # docs/13 phát hiện E1b bị bác → cổng mới G-Gold/G-E1c/G-Primary trước khi chạy.
    blockers: [E1c_endo_rerun, gold_events_csv, E1c_exo, primary_cell_shock_resolved]
    commitment: >
      Báo cáo TOÀN BỘ đường cong bất kể kết quả. Không ô nào bị loại khỏi report
      sau khi đã chạy. Không chạm holdout.

# ---------------------------------------------------------------------------
# ĐẾM SỐ LẦN THỬ (multiple-testing / Deflated Sharpe — docs/09 §2.7)
# ---------------------------------------------------------------------------
# Mỗi lần chạy 1 spec trên 1 outcome = 1 trial. Deflated Sharpe (Bailey-López de
# Prado) phạt theo số trial. Cập nhật thủ công mỗi khi chạy một backtest/test mới.
trial_log:
  n_trials: 0
  note: "G2a rerun (D3) chưa tính vào đây (research LP, chưa phải backtest tín hiệu). Đếm bắt đầu ở G3."
